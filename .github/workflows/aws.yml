name: Deploy to EC2 (Build with version tag)

on:
  push:
    branches: [ AWS ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG to Git short SHA
        id: vars
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      # 如果前端代码在子目录 frontend/，请保留下面的 context/file；
      # 如果就在仓库根目录，请把 context/file 改成 "." 和 "./Dockerfile"
      - name: Build and push Docker image (frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/airline-order-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/airline-order-frontend:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend on EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ secrets.DOCKER_HUB_USERNAME }}/airline-order-frontend:${{ env.IMAGE_TAG }}"
            CONTAINER="airline-frontend"
            HOST_PORT="8081"

            echo "👀 Checking Docker daemon..."
            # 如果 docker info 失败，再尝试多种启动方式，但都不让脚本报错
            if ! sudo docker info >/dev/null 2>&1; then
              # systemd（有则试，没有就忽略）
              if command -v systemctl >/dev/null 2>&1; then
                sudo systemctl start docker || true
                sudo systemctl enable docker || true
              fi
              # sysvinit / service
              sudo service docker start 2>/dev/null || true
              # snap 方式安装的 docker
              sudo snap start docker 2>/dev/null || true
            fi

            # 仍然不行就明确失败
            if ! sudo docker info >/dev/null 2>&1; then
              echo "❌ Docker daemon is not running. Please ensure Docker is installed and the daemon is started."
              exit 1
            fi
            echo "✅ Docker is ready."

            echo "🔐 Docker Hub login..."
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | sudo docker login \
              --username "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            echo "📦 Pulling image: $IMAGE"
            sudo docker pull "$IMAGE"

            echo "🧹 Removing old container (if any)..."
            if sudo docker ps -a --format '{{.Names}}' | grep -qx "$CONTAINER"; then
              sudo docker rm -f "$CONTAINER"
            fi

            echo "🚀 Starting frontend on :${HOST_PORT} -> container :80"
            sudo docker run -d --name "$CONTAINER" \
              -p "${HOST_PORT}:80" \
              --restart unless-stopped \
              "$IMAGE"

            echo "📊 Containers:"
            sudo docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Ports}}"

