name: Deploy to EC2 (Build with version tag)

on:
  push:
    branches: [ AWS ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG to Git short SHA
        id: vars
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      # 如果前端代码在子目录 frontend/，请保留下面的 context/file；
      # 如果就在仓库根目录，请把 context/file 改成 "." 和 "./Dockerfile"
      - name: Build and push Docker image (frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/airline-order-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/airline-order-frontend:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend on EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ secrets.DOCKER_HUB_USERNAME }}/airline-order-frontend:${{ env.IMAGE_TAG }}"
            CONTAINER="airline-frontend"
            HOST_PORT="8081"   # 后端占了 80，这里用 8081 暴露前端

            # 确保 docker 在跑
            if command -v systemctl >/dev/null 2>&1; then
              sudo systemctl enable --now docker
            fi

            # 登录 Docker Hub（私库需要；公库执行也无害）
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | sudo docker login \
              --username "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # 拉镜像
            sudo docker pull "$IMAGE"

            # 停并删旧容器（若存在）
            if sudo docker ps -a --format '{{.Names}}' | grep -qx "$CONTAINER"; then
              sudo docker rm -f "$CONTAINER"
            fi

            # 运行前端：宿主 8081 -> 容器 80
            sudo docker run -d --name "$CONTAINER" \
              -p "${HOST_PORT}:80" \
              --restart unless-stopped \
              "$IMAGE"

            # 打印状态
            sudo docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Ports}}"
